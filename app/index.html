<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; img-src 'self' data:;" />
  <title>LRC EDITOR</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <strong>LRC EDITOR</strong>
    <span id="statusText" class="status">mp3 / lrc 파일을 열거나 끌어다 놓으세요</span>
  </header>

  <main class="split">
    <!-- 좌측: mp3 재생기 -->
    <section class="pane player" id="dropZone">
      <h2>🎵 재생기</h2>
      <div class="dropHint" id="dropHint">여기에 mp3 / lrc 를 끌어다 놓기</div>
      <div class="trackName" id="trackName">로드된 파일 없음</div>

      <audio id="audio"></audio>

      <div class="seekWrap">
        <input type="range" id="seek" min="0" max="100" value="0" step="0.01" />
        <div class="times"><span id="curTime">00:00.00</span> / <span id="durTime">00:00.00</span></div>
      </div>

      <div class="controls">
        <button id="playBtn">▶︎ 재생</button>
        <button id="back5">⟲ 5s</button>
        <button id="fwd5">5s ⟳</button>
        <label class="rate">속도
          <select id="rate">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
          </select>
        </label>
      </div>

      <div class="fileBtns">
        <button id="openMp3">mp3 열기…</button>
        <button id="clearMp3" title="현재 mp3 해제 (다른 mp3 첨부 가능)">mp3해제</button>
        <button id="loadSample">샘플 불러오기</button>
      </div>
    </section>

    <!-- 우측: lrc 편집기 -->
    <section class="pane editor">
      <div class="editorHead">
        <h2>📝 LRC 편집기</h2>
        <div class="editorBtns">
          <button id="newLrc" title="빈 LRC로 새로 시작">새 LRC</button>
          <button id="openLrc">LRC 열기…</button>
          <button id="clearLrc" title="현재 가사 해제 (다른 lrc 첨부 가능)">LRC해제</button>
          <button id="saveLrc">저장…</button>
        </div>
      </div>

      <div class="stampBar">
        <button id="stampBtn" class="primary" title="단축키: S">⏱ 현재 시각 찍기 (S)</button>
        <button id="addLine">+ 줄 추가</button>
        <label class="demoToggle"><input type="checkbox" id="demoMode" /> 데모(가사 따라가기)</label>
      </div>

      <ol id="lines" class="lines"></ol>
      <div class="hint">가사 영역 클릭=편집(빈 줄도) · 시간 더블클릭=시간 편집(mm:ss.xx) · 재생 중 <kbd>S</kbd>=타임스탬프 · <kbd>Enter</kbd>=확정 · <kbd>Esc</kbd>=취소</div>
    </section>
  </main>

  <script src="lrc-core.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
