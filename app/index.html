<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; img-src 'self' data:;" />
  <title>LRC EDITOR</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 창 전체 드롭 영역 (드래그 중에만 표시) -->
  <div id="dropOverlay" class="drop-overlay" hidden>
    <div class="drop-overlay-box">
      <div class="drop-overlay-icon">⤓</div>
      <div data-i18n="drop.overlay">Drop files anywhere</div>
    </div>
  </div>

  <header class="topbar">
    <strong>LRC EDITOR</strong>
    <span id="statusText" class="status"></span>
    <label class="langPick">
      <span data-i18n="label.language">Languages</span>
      <select id="langSelect"></select>
    </label>
  </header>

  <main class="split">
    <!-- 좌측: mp3 재생기 -->
    <section class="pane player" id="dropZone">
      <h2 data-i18n="player.title">🎵 Player</h2>
      <div class="dropHint" id="dropHint" data-i18n="player.dropHint">Drop mp3 / lrc here</div>

      <div class="trackMeta">
        <img id="coverArt" class="coverArt" alt="" hidden />
        <div class="metaText">
          <div id="mTitle" class="m-title"></div>
          <div id="mArtist" class="m-artist"></div>
          <div id="mAlbum" class="m-album"></div>
          <div id="trackName" class="trackName"></div>
        </div>
      </div>

      <audio id="audio"></audio>

      <div class="seekWrap">
        <input type="range" id="seek" min="0" max="100" value="0" step="0.01" />
        <div class="times"><span id="curTime">00:00.00</span> / <span id="durTime">00:00.00</span></div>
      </div>

      <div class="controls">
        <button id="playBtn" data-i18n="btn.play">▶︎ Play</button>
        <button id="back5">⟲ 5s</button>
        <button id="fwd5">5s ⟳</button>
        <label class="rate">
          <span data-i18n="label.speed">Speed</span>
          <select id="rate">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
          </select>
        </label>
      </div>

      <div class="fileBtns">
        <button id="openMp3" data-i18n="btn.openMp3">Open mp3…</button>
        <button id="clearMp3" data-i18n="btn.clearMp3" data-i18n-title="tip.clearMp3">Clear mp3</button>
        <button id="tagClear" data-i18n="btn.tagClear" data-i18n-title="tip.tagClear">Clear tags</button>
      </div>
      <button id="demoPlay" class="primary demoPlayBtn" data-i18n="btn.demoPlay">🎤 Demo play</button>
    </section>

    <!-- 우측: lrc 편집기 -->
    <section class="pane editor">
      <div class="editorHead">
        <h2 data-i18n="editor.title">📝 LRC Editor</h2>
        <div class="editorBtns">
          <button id="newLrc" data-i18n="btn.newLrc" data-i18n-title="tip.newLrc">New LRC</button>
          <button id="openLrc" data-i18n="btn.openLrc">Open LRC…</button>
          <button id="clearLrc" data-i18n="btn.clearLrc" data-i18n-title="tip.clearLrc">Clear LRC</button>
          <button id="saveLrc" data-i18n="btn.save">Save…</button>
        </div>
      </div>

      <div class="stampBar">
        <button id="stampBtn" class="primary" data-i18n="btn.stamp">⏱ Stamp time (S)</button>
        <button id="addLine" data-i18n="btn.addLine">+ Add line</button>
        <button id="addMulti" data-i18n="btn.addMulti">+ Add multi line</button>
        <label class="demoToggle"><input type="checkbox" id="demoMode" /> <span data-i18n="label.demo">Demo (follow lyrics)</span></label>
      </div>

      <ol id="lines" class="lines"></ol>
      <div class="hint"></div>
    </section>
  </main>

  <!-- 노래방 스타일 데모 플레이 (전체화면 오버레이) -->
  <div id="demoOverlay" class="demo-overlay" hidden>
    <div class="demo-bar">
      <div class="demo-meta">
        <img id="dCover" class="demo-cover" alt="" hidden />
        <div class="demo-meta-text">
          <span id="dTitle" class="demo-title"></span>
          <span id="dArtist" class="demo-artist"></span>
        </div>
      </div>
      <button id="dPlay" class="demo-btn play">▶</button>
      <span id="dCur" class="demo-time">00:00.00</span>
      <input type="range" id="dSeek" class="demo-seek" min="0" max="100" step="0.01" value="0" />
      <span id="dDur" class="demo-time">00:00.00</span>
      <span class="demo-loop">
        <button id="dSetA" class="demo-btn" data-i18n-title="demo.tipA">A</button>
        <button id="dSetB" class="demo-btn" data-i18n-title="demo.tipB">B</button>
        <button id="dClearAB" class="demo-btn" data-i18n-title="demo.loopClear">↺</button>
        <span id="dABInfo" class="demo-ab"></span>
      </span>
      <button id="dClose" class="demo-btn close" data-i18n-title="demo.tipClose">✕</button>
    </div>
    <div class="demo-stage">
      <div class="demo-line prev"><span id="dPrev" class="dt"></span></div>
      <div class="demo-line current"><span id="dCurLine" class="dt"></span></div>
      <div class="demo-line next"><span id="dNext1" class="dt"></span></div>
      <div class="demo-line next"><span id="dNext2" class="dt"></span></div>
    </div>
  </div>

  <!-- 여러 줄 추가 모달 -->
  <div id="multiModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-head">
        <strong data-i18n="multi.title">Add multiple lines</strong>
        <button id="multiClose" class="modal-x">✕</button>
      </div>
      <div class="modal-body">
        <textarea id="multiInput" data-i18n-ph="multi.placeholder" spellcheck="false"></textarea>
        <div class="modal-preview">
          <div class="modal-preview-head" id="multiCount"></div>
          <ol id="multiPreview" class="preview-list"></ol>
        </div>
      </div>
      <div class="modal-hint" data-i18n="multi.hint"></div>
      <div class="modal-foot">
        <button id="multiCancel" data-i18n="multi.cancel">Cancel</button>
        <button id="multiAdd" class="primary" data-i18n="multi.add">Add lines</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="lrc-core.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
